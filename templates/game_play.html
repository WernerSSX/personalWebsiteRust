{% extends "base.html" %}

{% block title %}{{ game.title }} — My Site{% endblock %}

{% block content %}
<a href="/games" style="color: #8a847c; font-size: 0.85rem;">← Back to games</a>

<h1 style="margin-top: 16px;">{{ game.title }}</h1>
{% if game.summary %}
    <p class="muted">{{ game.summary }}</p>
{% endif %}

<div style="display: flex; flex-direction: column; align-items: center; margin: 32px 0;">
    <!--
        The game runs inside an iframe that points to the static HTML
        wrapper in /static/games/slug/index.html. The iframe isolates
        the game's full-page canvas from the rest of your site layout.
    -->
    <iframe
        src="/static/games/{{ game.slug }}/index.html"
        sandbox="allow-scripts allow-same-origin"
        style="width: 520px; max-width: 100%; aspect-ratio: 4/3;
               border: 1px solid #2a2725; border-radius: 6px;
               background: #0a0a0c;"
        allowfullscreen>
    </iframe>
    <p style="margin-top: 12px; font-size: 0.8rem; color: #8a847c;
              font-family: monospace;">
        Arrow keys / WASD to move · Space to act · Click game to focus
    </p>
</div>
{% endblock %}
