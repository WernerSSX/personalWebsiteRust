{% extends "base.html" %}

{% block title %}Counter — Werner Site{% endblock %}

{% block content %}
<h1>Counter</h1>
<p class="muted">Press the button. Watch the number go up.</p>

<div style="display: flex; flex-direction: column; align-items: center; margin: 40px 0; gap: 24px;">
    <div id="counter-display" style="font-size: 72px; color: #1a1a2e; font-family: 'VT323', monospace;">
        0
    </div>
    <button id="counter-btn"
        style="font-family: 'VT323', monospace; font-size: 28px;
               background: #2563eb; color: #ffffff; border: none;
               border-radius: 8px; padding: 12px 32px; cursor: pointer;
               box-shadow: 0 4px 0 #1d4ed8, 0 6px 12px rgba(0,0,0,0.2);
               transition: transform 0.1s, box-shadow 0.1s;">
        Press Me!
    </button>
</div>

<script src="/static/js/counter.js"></script>
{% endblock %}
